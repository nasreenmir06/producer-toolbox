<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: monospace; padding: 20px; background: #1e1e1e; color: #0f0; }
    #timer { font-size: 20px; margin: 20px 0; }
  </style>
</head>
<body>
  <h2>Offscreen Active</h2>
  <div id="timer">Alive: 0s</div>
  <div id="log"></div>
  <script src="offscreenWorker.js" type="module"></script>
  <script>
    // ui feedback
    console.log('Offscreen HTML loaded');
    
    let seconds = 0;
    setInterval(() => {
      seconds++;
      document.getElementById('timer').textContent = `Alive: ${seconds}s`;
    }, 1000);
  </script>
</body>
</html>
